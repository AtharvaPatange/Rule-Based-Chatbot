<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solapur HeatGuard Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Sora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <main class="app-shell">
      <section class="hero-card reveal">
        <p class="eyebrow">Municipal Safety Assistant</p>
        <h1>Solapur HeatGuard</h1>
        <p>
          Ask about heat safety, sunstroke first-aid, travel precautions, and local
          summer guidance in Solapur.
        </p>
      </section>

      <section class="chat-card reveal reveal-delay">
        <header class="chat-header">
          <div>
            <h2>Live Bot Chat</h2>
            <p id="statusText" class="status">Connecting...</p>
          </div>
          <button id="clearChatBtn" class="ghost-btn" type="button">Clear Chat</button>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <div id="chips" class="chips" aria-label="Quick suggestions"></div>

        <form id="chatForm" class="chat-form">
          <input
            id="messageInput"
            type="text"
            placeholder="Type your question..."
            autocomplete="off"
            required
          />
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
